[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "Detective"
version = "0.1.0"
description = "Behavioral-scope diagnosis and warrant-classed test synthesis for a single Python function, on the Wesker mutation engine."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Rohan Vinaik" }]
keywords = [
    "mutation-testing",
    "test-generation",
    "code-comprehension",
    "specification",
    "ast",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Software Development :: Quality Assurance",
]

# Runtime deps: the Wesker mutation engine (the profiler) AND pytest — Detective's
# PRODUCT is pytest suites and it runs pytest to wire + verify them, so pytest is a
# runtime requirement, not dev-only. Wesker is a sister repo not yet on PyPI, so it is
# pinned to a git TAG for reproducibility (a floating branch ref drifts every install —
# the exact defect that shipped a Wesker missing the API Detective needs). Requires the
# matching `v0.3.0` tag on the Wesker remote (push + tag Wesker before installing Detective).
#
# ── PRE-PyPI-PUBLISH CHECKLIST (do all three, in this order) ────────────────────────────
#   0. Publish Wesker 0.3.0 to PyPI first (PyPI rejects direct-URL deps).
#   1. Replace the git-URL below with a plain package spec:  "Wesker>=0.3.0".
#   2. Remove `[tool.uv.sources] Wesker` (the local ../Wesker path) AND
#      `[tool.hatch.metadata] allow-direct-references` — both exist ONLY for the git-URL
#      dev/git-install path; a PyPI package must depend on the PyPI package, not a local repo.
dependencies = [
    "Wesker @ git+https://github.com/rohanvinaik/Wesker.git@v0.3.0",
    "pytest>=7",
]

# The MCP surface is optional so the core stays Wesker + stdlib only.
[project.optional-dependencies]
mcp = ["mcp>=1.0"]

[project.scripts]
detective = "Detective.cli:main"
detective-mcp = "Detective.mcp_server:main"

[project.urls]
Homepage = "https://github.com/rohanvinaik/Detective"
Repository = "https://github.com/rohanvinaik/Detective"

[dependency-groups]
# ruff pinned so CI's `ruff format --check` gate cannot drift on a newer release.
dev = ["pytest>=7", "pytest-cov>=4", "ruff==0.14.10"]

# Wesker is the sister repo; consumed as an editable path install in local dev,
# resolving to the published Wesker on PyPI otherwise.
[tool.uv.sources]
Wesker = { path = "../Wesker", editable = true }

# Only the package ships. The dev/ generator tree (which imports LintGate as a
# dev-time conformance oracle) is deliberately excluded from the wheel so no
# LintGate reference ever enters the runtime import graph.
[tool.hatch.build.targets.wheel]
packages = ["Detective"]

# Required so the git-URL Wesker dependency is accepted (drop once Wesker is on PyPI).
[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-q --strict-markers --strict-config"

[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Generated test files are machine-produced, not hand-maintained, so line length is
# exempt: the synth suites (`test_*_synth.py`) carry a long auto-generated docstring
# naming the fully-qualified target, and the scope-oracle fixtures embed the exact
# (deliberately long) expected warning strings the engine emits. Everything else in
# these files — imports, assertions, real bugs — is still linted.
"tests/test_*_synth.py" = ["E501"]
"tests/test_scope_oracle.py" = ["E501"]

[tool.coverage.run]
source = ["Detective"]
omit = ["Detective/cli.py", "Detective/__main__.py", "Detective/__init__.py"]
